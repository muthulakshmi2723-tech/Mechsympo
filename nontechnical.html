<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Non-Technical Events</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #ff3b3b;
      margin-bottom: 40px;
    }

    .event-container {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;

    }

    .event-card {

      padding: 30px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      box-shadow: 0 0 15px rgba(255,59,59,0.2);
    }

    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: #ff3b3b;
      color: white;
      border-radius: 20px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<a href="events.html" class="home-btn">🏠 Back</a>

<h1>🚀 Non-Technical Events</h1>

<div class="event-container">
  <div class="event-card">📸 Photography</div>
  <div class="event-card">🚀 Start-up Ideas</div>
  <div class="event-card">🗺️ Treasure Hunt</div>
  <div class="event-card">💧 Water Rocket</div>
</div>

</html>

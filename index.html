<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechnovate '26</title>

<style>
/* ================= GLOBAL ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f172a, #000);
  color: white;
  overflow-x: hidden;
}

/* ================= NAVBAR ================= */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.3);
}

nav h1 {
  color: #00f5ff;
  letter-spacing: 2px;
}

nav ul {
  display: flex;
  gap: 25px;
  list-style: none;
}

nav ul li {
  cursor: pointer;
  transition: 0.3s;
}

nav ul li:hover {
  color: #00f5ff;
  transform: scale(1.1);
}

.btn {
  background: linear-gradient(45deg, #00f5ff, #0077ff);
  padding: 10px 18px;
  border-radius: 25px;
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* ================= HERO ================= */
.hero {
  text-align: center;
  margin-top: 80px;
  animation: fadeIn 1.5s ease;
}

.hero p {
  color: #aaa;
  margin-top: 15px;
}

.hero h1 {
  font-size: 70px;
  margin-top: 10px;
}

.hero .red { color: #ff3b3b; }
.hero .blue { color: #00f5ff; }

.glow {
  text-shadow: 0 0 20px #00f5ff;
}

.buttons {
  margin-top: 30px;
}

.buttons button {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
}

.red-btn {
  background: linear-gradient(45deg, #ff3b3b, #ff7b7b);
  color: white;
}

.outline-btn {
  background: transparent;
  border: 2px solid #00f5ff;
  color: #00f5ff;
}

.buttons button:hover {
  transform: scale(1.1);
}

/* ================= COUNTDOWN ================= */
.countdown {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 80px;
  flex-wrap: wrap;
}

.box {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  width: 120px;
  box-shadow: 0 0 15px rgba(0,245,255,0.2);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.box:hover {
  transform: translateY(-5px);
}

.box h2 {
  font-size: 35px;
  color: #00f5ff;
}

/* ================= FOOTER ================= */
footer {
  text-align: center;
  margin-top: 80px;
  padding: 20px;
  color: #777;
}

/* ================= ANIMATION ================= */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
  nav {
    flex-direction: column;
    gap: 10px;
  }

  .hero h1 {
    font-size: 40px;
  }
}

 .gear-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
  overflow: hidden;
}

/* Gear Shape */
.gear {
  position: absolute;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, #aaa 40%, #666 41%);
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* Teeth Effect */
.gear::before {
  content: "";
  position: absolute;
  inset: -10px;
  background: repeating-conic-gradient(
    #888 0deg 10deg,
    transparent 10deg 20deg
  );
  border-radius: 50%;
}

/* Center hole */
.gear::after {
  content: "";
  position: absolute;
  width: 30%;
  height: 30%;
  background: #111;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.g1 { top: 10%; left: 10%; animation: spin 10s linear infinite; }
.g2 { top: 60%; left: 20%; animation: spinReverse 14s linear infinite; }
.g3 { top: 30%; left: 70%; animation: spin 18s linear infinite; }
.g4 { top: 75%; left: 80%; animation: spinReverse 12s linear infinite; }
.g5 { top: 50%; left: 50%; animation: spin 20s linear infinite; }

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}

/* Smooth Scroll */ html { scroll-behavior: smooth; } /* ✅ FIX: BUTTON CONTAINER */ .buttons { display: flex; justify-content: center; /* center horizontally */ align-items: center; gap: 20px; /* space between buttons */ margin-top: 30px; flex-wrap: wrap; /* responsive */ } /* ✅ BUTTON BASE STYLE */ .buttons a { display: flex; align-items: center; justify-content: center; height: 45px; padding: 0 25px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 0; /* remove extra spacing */ transition: 0.3s; } /* REGISTER BUTTON */ .red-btn { background: linear-gradient(45deg, #ff3b3b, #ff7b7b); color: white; } /* VIEW EVENTS BUTTON */ .view-btn { position: relative; overflow: hidden; border: 2px solid #00f5ff; color: #00f5ff; } /* HOVER EFFECT */ .view-btn::before { content: ""; position: absolute; width: 0%; height: 100%; top: 0; left: 0; background: linear-gradient(90deg, #00f5ff, transparent); transition: 0.4s; } .view-btn:hover::before { width: 100%; } .view-btn:hover { color: black; background: #00f5ff; box-shadow: 0 0 20px #00f5ff; } /* HOVER LIFT */ .buttons a:hover { transform: translateY(-3px); }

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 45px;   /* adjust size */
  height: 45px;
  object-fit: contain;
}

.logo h1 {
  color: #00f5ff;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="gear-bg">
  <div class="gear g1"></div>
  <div class="gear g2"></div>
  <div class="gear g3"></div>
  <div class="gear g4"></div>
  <div class="gear g5"></div>
</div>
<!-- NAVBAR -->
<nav>
  <div class="logo">
    <img src="logo.jpeg" alt="logo">
    <h1>MECHNOVATE '26</h1>
  </div>

  <ul>
    <li>About</li>
    <li>Events</li>
    <li>Timeline</li>
    <li>Contact</li>
  </ul>
</nav>
<!-- HERO -->
<div class="hero">
  <p>A NATIONAL LEVEL TECHNICAL SYMPOSIUM</p>

  <h1 class="glow">
    <span class="red">MECH</span><span class="blue">NOVATE</span> '26
  </h1>

  <p>Innovate • Collaborate • Elevate the Future of Technology</p>

 <!-- BUTTONS -->
<div class="buttons">
  <a href="https://forms.gle/s8g7L3DqnuDHDg8y8" target="_blank" class="red-btn">Register Now</a>
  <a href="events.html" class="outline-btn view-btn" target="_blank">⚡ View Events</a>
</div>


<!-- COUNTDOWN -->
<div class="countdown">
  <div class="box">
    <h2 id="days">00</h2>
    <p>Days</p>
  </div>

  <div class="box">
    <h2 id="hours">00</h2>
    <p>Hours</p>
  </div>

  <div class="box">
    <h2 id="minutes">00</h2>
    <p>Minutes</p>
  </div>

  <div class="box">
    <h2 id="seconds">00</h2>
    <p>Seconds</p>
  </div>
</div>

<footer>
  © 2026 Mechnovate Symposium | Designed with ❤️
</footer>

<!-- JS COUNTDOWN -->
<script>
const eventDate = new Date("April 01, 2026 09:30:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const distance = eventDate - now;

  document.getElementById("days").innerText =
    Math.floor(distance / (1000 * 60 * 60 * 24));

  document.getElementById("hours").innerText =
    Math.floor((distance / (1000 * 60 * 60)) % 24);

  document.getElementById("minutes").innerText =
    Math.floor((distance / (1000 * 60)) % 60);

  document.getElementById("seconds").innerText =
    Math.floor((distance / 1000) % 60);

}, 1000);
</script>

</body>
</html>
